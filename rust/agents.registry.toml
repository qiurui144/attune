# ACP-1 Agent Registry — central agent directory (workspace SSOT).
#
# Spec: docs/superpowers/specs/2026-05-29-ai-agents-governance-orchestration.md §5.1
# S4b (2026-06-03): OSS boundary enforced — 6 oss-core agents only.
# Industry agents (14 law-pro + 1 tech-pro + 1 law-pro VLM) moved to
# attune-pro/plugins/<vertical>/agents.registry.toml.
#
# Human-authored + auditable. Loaded + validated at startup (registry.rs):
#   - every agent id unique; every capability_boundary unique (single-point);
#   - every agent binds a quality gate; every handoff declares typed consumes/produces.
# A shadow agent (an id invoked but absent here) is rejected at the call site.
#
# Typed handoff (consumes/produces) is the ACP-6 autonomous-flow foundation:
# a flow step A → B is legal iff A.produces == B.consumes.
#
# kind:        deterministic | llm-judge | rule | vlm
# tier:        free | paid
# cost_class:  zero | local | cloud
# model_tier_floor: "" (deterministic) | qwen3b | flash | gpt-4o-mini | sonnet

# ─────────────────────────── OSS attune (6, free, oss-core) ───────────────────

[[agent]]
id = "document_classifier"
tier = "free"
plugin = "oss-core"
kind = "deterministic"
capability_boundary = "文档分类 → 证据 kind + 置信度 + 追问"
model_tier_floor = ""
cost_class = "zero"
gate = "oss/document_classifier_agent_golden_gate"
route_keywords = []
route_priority = 0
[agent.handoff]
consumes = "RawDocument"
produces = "DocumentClassification"

