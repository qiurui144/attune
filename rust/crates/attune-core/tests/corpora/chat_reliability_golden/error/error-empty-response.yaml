id: error-empty-response
description: |
  Empty response — agent must not panic, must return all-empty signal
  vectors with neutral confidence 0.5. Empty response means "the LLM
  produced nothing" which is neither evidence of reliability nor of
  unreliability.

query: 什么都行
response: ""
chunks:
  - item_id: any-chunk
    chunk_text: |
      任何内容都不会被检索因为响应是空的。

expected:
  citation_grounded: []
  contradictions_count: 0
  hallucination_kinds: []
  confidence_range: [0.5, 0.5]

# DERIVATION:
# evaluate_response short-circuits when response.trim().is_empty(). All three
# signal vectors are empty. Confidence is the neutral fixed value 0.5
# (not 1.0, because "no response" is not evidence of "well-grounded
# response"; not 0.0, because there's no evidence of bad grounding either).
#
# This is the literal contract documented in evaluate_response().

reviewer:
  approved: true
  name: ENGINEERING_FIXTURE
