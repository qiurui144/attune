query: rust 的所有权规则是什么？
response: |
  Rust 的所有权有三条规则：每个值有唯一所有者；当所有者离开作用域时值被丢弃；
  借用必须在所有者作用域内有效 [item:rust-book-ch4]。

chunks:
  - item_id: rust-book-ch4
    chunk_text: |
      所有权规则：每个值在 Rust 中都有一个所有者；同一时刻只能有一个所有者；
      当所有者离开作用域时，这个值将被丢弃。这套规则是 Rust 内存安全的基础。
  - item_id: rust-book-ch5
    chunk_text: |
      借用允许你引用某个值而不获取其所有权。借用必须在所有者的作用域内有效。

