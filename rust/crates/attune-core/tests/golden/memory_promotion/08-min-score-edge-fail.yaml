id: 08-min-score-edge-fail
description: |
  Single-chunk, 30d old, exactly 3 citations — passes access gate but fails score.
  Independent score: 1.0*3 + 2.0/(1+30*0.1) + 0.5*ln(1) = 3 + 2/4 + 0 = 3.5 → < 4.0 → gated by score.
  Mirror of case 07 with the recency dial flipped — old episodics need *more* than
  just minimum access to bubble up.
episodic_memories:
  - id: ep-old-min-access
    chunk_hashes: [old-001]
    summary: |
      用户一个月前引用过的单一短文档，
      最近无新增引用。
    created_at_offset_days: 30
citation_hits:
  - chunk: old-001
    count: 3
config:
  promotion_window_days: 60
  min_access_count: 3
  min_score: 4.0
  max_promotions_per_run: 50
expected:
  promoted_ids: []
  gated_by_access: 0
  gated_by_score: 1
  already_promoted: 0
reviewer:
  approved: true
