# Agent Quality Manifest — workspace SSOT (ACP-2)
#
# spec: docs/superpowers/specs/2026-05-29-ai-agents-governance-orchestration.md §3 (ACP-2) + §9
# audit: docs/reports/2026-05-29-quality-gating-telemetry-audit.md (the 11-gate inventory)
#
# This is the single source of truth for every agent/engine quality gate across
# the attune workspace. It lifts the law-pro `thresholds.yaml` ratchet pattern to
# the workspace level (B audit finding #1: the only machine-checkable ratchet was
# in law-pro; the other 9 gates hardcoded thresholds inline in .rs with no roll-up).
#
# RATCHET RULE (per CLAUDE.md "Agent 验证铁律" + global §C3): thresholds only move
# STRICTER. `threshold` may only be >= `ratchet_baseline` for higher-is-better
# metrics (pass_rate / micro_f1 / accuracy / accept_count), or <= `ratchet_baseline`
# for lower-is-better metrics (wer / rtf). A PR that loosens a gate FAILS
# `agent_gate_orchestrator.rs::ratchet_only_up_*`. Tightening a gate requires
# raising BOTH `threshold` and `ratchet_baseline` together.
#
# metric_kind whitelist (closed enum — unknown value fails to parse):
#   exact_match_rate | field_exact_rate | status_correctness_rate
#   | relation_gap_set_match_rate | pass_rate | zero_violations
#   | min_field_accuracy | wer | rtf | micro_f1 | accept_count
#
# tier: deterministic (must hit 1.00) | llm (>= 0.85 floor) | engine (numeric red line)

gates:
  # ── attune-core OSS agent gates (machine-checkable, PR lane) ──────────────
  # B audit: these 5 OSS agent gates ALREADY EXIST (contradicting the "OSS has
  # no gate" framing). They are deterministic at their real baseline of 1.00 —
  # recorded honestly per R4 (decision #3: no fudging).

  - id: chat_reliability
    plugin: oss-core
    tier: deterministic
    crate: attune-core
    test_name: chat_reliability_golden_gate
    metric_kind: zero_violations
    threshold: 1.00            # 0 violations == pass_rate 1.00 over facets
    ratchet_baseline: 1.00
    fixture_min: 10            # >= 10 top + >= 3 error (audit :161,165,254)
    ignored: false
    ci: pr
    note: "deterministic — evaluate_response() over canned chunks, no LLM in path"

  - id: document_classifier
    plugin: oss-core
    tier: deterministic
    crate: attune-core
    test_name: document_classifier_agent_golden_gate
    metric_kind: zero_violations
    threshold: 1.00
    ratchet_baseline: 1.00
    fixture_min: 11            # >= 11 cases, >= 10 approved, >= 3 error, sentinel (audit :312-334)
    ignored: false
    ci: pr

  - id: linker
    plugin: oss-core
    tier: deterministic
    crate: attune-core
    test_name: linker_golden_gate
    metric_kind: zero_violations
    threshold: 1.00
    ratchet_baseline: 1.00
    fixture_min: 10            # >= 10 fixtures + symmetric/idempotent/out-degree proptests (audit :116,174)
    ignored: false
    ci: pr
    note: "internal_knowledge_linker — deterministic compute_links_for_item(), no LLM"

  - id: memory_consolidation
    plugin: oss-core
    tier: deterministic
    crate: attune-core
    test_name: memory_promotion_golden_gate_pass_rate_must_be_one
    metric_kind: pass_rate
    threshold: 1.00            # pass_rate must == 1.00 (hard, audit :258)
    ratchet_baseline: 1.00
    fixture_min: 14            # >= 14 cases (audit :259)
    ignored: false
    ci: pr
    note: "deterministic promotion logic; LLM summary path verified in oss_agent_real_llm (nightly)"

  - id: self_evolving_skill
    plugin: oss-core
    tier: deterministic
    crate: attune-core
    test_name: skill_evolution_golden_gate_pass_rate_must_be_one
    metric_kind: pass_rate
    threshold: 1.00            # heuristic path pass_rate == 1.00 (audit :309)
    ratchet_baseline: 1.00
    fixture_min: 13            # >= 13 cases, >= 11 main + >= 3 error (audit :309,352,356)
    ignored: false
    ci: pr
    note: >
      heuristic path deterministic, GT recomputed independently. LEGACY-OVERLAP:
      shares the skill_evolution module with the historical "skill_evolution"
      learning loop — both exercise skill_evolution::agent. Registry dedupe is
      deferred to v1.2 (spec R6, decision #4: this capability only governs, does
      not refactor agents). The LLM expansion path is verified in
      oss_agent_real_llm (nightly).

  # ── attune-core OSS real-LLM gate (orphan FIX — now nightly CI) ───────────
  # B audit finding #3: oss_agent_real_llm_gate.rs was written but NOT in any
  # attune workflow — the mock-0.99/real-0.09 class of bug could re-enter
  # undetected for the OSS memory/skill agents. acp.2 wires it into
  # .github/workflows/nightly-real-llm.yml.

  - id: oss_agent_real_llm
    plugin: oss-core
    tier: llm
    crate: attune-core
    test_name: oss_agent_real_llm_gate
    metric_kind: accept_count
    threshold: 4.00            # passed >= 4 of 5 per agent (audit :288,420) — "no moving goalposts"
    ratchet_baseline: 4.00
    fixture_min: 5             # 5 bundles / 5 queries per agent
    ignored: true              # requires Ollama running locally
    ci: nightly                # ORPHAN FIX: now scheduled (was manual-only)
    note: >
      verifies memory_consolidation (200-char zh summary) + self_evolving_skill
      (>= 2 keyword expansions) on a REAL model. Per Agent 验证铁律: if real LLM
      falls below threshold, label the agent Beta in RELEASE.md — do NOT relax
      the threshold here (only-up ratchet).

  # ── attune-server office engine gates (machine-checkable, PR lane) ────────
  # Numeric red lines; real PP-OCR / whisper.cpp engines over fixtures (no LLM).
  # Recorded at the STRICTEST scene/lang red line (audit :62-67, :198-245).

  - id: office_ocr
    plugin: oss-core
    tier: engine
    crate: attune-server
    test_name: office_ocr_golden_gate
    metric_kind: min_field_accuracy
    threshold: 0.92            # document/receipt/table/card floor (id/license stricter at 0.95)
    ratchet_baseline: 0.92
    fixture_min: 6             # scenes: document/receipt/table/card/id/license
    ignored: false
    ci: pr
    note: "per-scene red lines: 0.92 (doc/receipt/table/card), 0.95 (id_card/license); p50 latency caps too"

  - id: office_asr
    plugin: oss-core
    tier: engine
    crate: attune-server
    test_name: office_asr_golden_gate
    metric_kind: wer            # lower is better — ratchet caps the ceiling
    threshold: 0.18            # loosest red line (mixed zh-en); zh <= 0.15, en <= 0.10
    ratchet_baseline: 0.18
    fixture_min: 3             # zh / en / mixed lang dirs
    ignored: false
    ci: pr
    note: "char-level WER red lines: zh <= 0.15, en <= 0.10, mixed <= 0.18; RTF p50 <= 0.5"

  # ── S4b (2026-06-03): attune-pro external gates removed from OSS manifest ──
  # tech_pro_code_reviewer / law_pro_deterministic / law_pro_fact_extractor_llm
  # have been removed from this OSS manifest per S4b industry decoupling.
  # These gates are enforced in attune-pro's own thresholds.yaml + CI.
  # See: docs/superpowers/specs/2026-06-02-oss-industry-decoupling.md §4.1 MU-8

# Per-crate #[ignore] baseline counts for the spike guard (per CLAUDE.md §7.2
# Gate 2: new #[ignore] must not spike beyond baseline + 2). The orchestrator
# counts REAL #[ignore] attributes in the crate's tests/ dir — this number is
# the committed ceiling reference. Bumping it up requires a deliberate PR edit.
#
# attune-core baseline measured by `agent_gate_orchestrator.rs::ignore_spike_*`
# scanning crates/attune-core/tests/ at acp.2 land time. Set generously to the
# observed count so the guard catches *future* spikes without false-positiving
# on the existing slow-test-nightly migration (#[ignore] E2E tests, ci.yml:170).
ignore_baseline:
  # 2026-06-08 re-baselined 35→43: doc-intelligence test expansion added env-gated
  # real-model legs (asr/ocr/real-LLM) + heavyweight (10MB/deep-nested) + 1 office
  # BUG-3b FLAG — all legit env/slow gates per §1.2 / §7.2 Gate 2, NOT failure-skips.
  # The prior 35 was stale (never bumped as nightly/env #[ignore] accumulated; the
  # spike was masked by the earlier rust-test ENOSPC failure until the disk-reclaim fix).
  # 2026-06-11 re-baselined 43→46: non-text recognition real-model smokes (layout
  # ONNX + CLI recognize) + doc-intel real-LLM lanes ×3 + documents_member_gate
  # real-LLM leg — all env-gated real-model/real-LLM lanes, NOT failure-skips.
  attune-core: 46
