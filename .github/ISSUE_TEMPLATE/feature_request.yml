name: Feature Request
description: 提议一个新功能 / Propose a new feature
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        在提议新功能前,请查 [`docs/oss-pro-strategy.md`](https://github.com/qiurui144/attune/blob/main/docs/oss-pro-strategy.md) 确认 OSS / Pro / Enterprise 边界 —— 行业专属功能(law / patent / medical 等)归 attune-pro,通用功能归 attune OSS。

  - type: textarea
    id: use-case
    attributes:
      label: 用例 / Use Case
      description: 你想完成什么任务?何时会用这个功能?
      placeholder: |
        例:作为攻读法学硕士的学生,我需要在 attune 中标注教科书章节并跟踪引用次数,以便复习时知道哪些章节是高频考点。
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 价值 / Why it matters
      description: 不实现这个功能,user 当前怎么 workaround?痛点多大?
      placeholder: 当前只能手动 grep 笔记,每周浪费 2 小时。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives considered
      description: 你考虑过的其他实现方式?为什么觉得本方案最好?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 归属 / Product line
      description: 这功能应该进哪条产品线?
      options:
        - attune (OSS) — 通用,任何 user 受益
        - attune-pro plugin pack — 行业增强(law / patent / medical / sales / academic 等)
        - lawcontrol (B2B) — 律所小团队协作
        - cloud SaaS — 服务端 / 官网 / wiki
        - 不确定 / triage 决定
    validations:
      required: true

  - type: checkboxes
    id: confirmations
    attributes:
      label: 自查 / Self-check
      options:
        - label: 已搜索 [existing feature requests](https://github.com/qiurui144/attune/issues?q=is%3Aissue+label%3Aenhancement) 无重复
          required: true
        - label: 已读 [oss-pro-strategy.md](https://github.com/qiurui144/attune/blob/main/docs/oss-pro-strategy.md) 理解三产品边界
          required: false
