name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: mypy src/

      - name: Test
        run: pytest tests/ -v

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build
        working-directory: extension
        run: npm run build

  rust-test:
    # Rust 商用线 CI — attune-core + attune-server + attune-cli workspace
    # MockLlmProvider 驱动，无 Ollama 依赖
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-v1-${{ hashFiles('rust/Cargo.lock') }}
      - name: cargo test workspace
        working-directory: rust
        run: cargo test --workspace --release
      - name: cargo clippy (non-blocking)
        working-directory: rust
        run: cargo clippy --workspace --release -- -D warnings
        continue-on-error: true
