  rust-clippy:
    # Lint as its own parallel job (was an inline non-blocking step). Stays
    # non-blocking (continue-on-error) to preserve prior behavior — the Python
    # prototype line + Rust workspace lint is advisory, not a PR hard-gate here.
    runs-on: ubuntu-latest
    name: rust-clippy
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: clippy-ubuntu-latest-v3

      - name: cargo clippy (non-blocking)
        working-directory: rust
        run: cargo clippy --workspace --release -- -D warnings
        continue-on-error: true

  cargo-audit:
    # Security: run cargo audit + cargo deny on every push/PR.
    # rustsec/audit-check caches advisory-db; cargo-deny checks licenses + bans.
    # No untrusted input used in run: steps.
    runs-on: ubuntu-latest
    # rustsec/audit-check@v2 posts findings as a GitHub Check Run (POST /repos/.../check-runs);
    # needs checks:write. contents:read keeps the rest of the job least-privilege.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-v1-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-audit-v1-

      - name: cargo audit (RUSTSEC vulnerability scan)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check (licenses + bans + sources)
        working-directory: rust
        run: cargo deny check

  secret-scan:
    # Security (CLAUDE.md §1.4): gitleaks secret scan over commit history + tree.
    # Policy: .gitleaks.toml (history is clean — 983 commits, 0 real secrets;
    # allowlist covers gitignored working files, third-party test corpus, the
    # Ed25519 *public* verify key, and explicit test-stub literals). Mirrors
    # attune-pro's secret-scan job. No untrusted input is used in run: steps.
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just HEAD.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Repo-local config (.gitleaks.toml) is auto-detected by the action.
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
          GITLEAKS_ENABLE_SUMMARY: "true"

  coverage:
    # Code coverage REPORTING (cargo-llvm-cov). REPORT-ONLY on day one — measures
    # a baseline and uploads lcov + summary as artifacts; NOT a blocking gate
    # (no --fail-under). A conservative ratchet floor can be turned on once the
    # baseline is observed across a few runs. Mirrors attune-pro's coverage job.
    # attune is a self-contained workspace (no sibling checkout needed). --release
    # keeps link memory in check; the workspace pulls wasmtime/onnx/tantivy/
    # usearch so the build is heavy — free disk up front like the test jobs.
    name: Coverage (report-only)
    runs-on: ubuntu-latest
    # The instrumented (-C instrument-coverage) full-workspace --release build is
    # far heavier than a normal build and hit the 60min wall still compiling on
    # run 27241292586. 90min clears it. Report-only (no --fail-under), so this gate
    # never blocks a PR on coverage numbers — only on the job completing.
    timeout-minutes: 90
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (reclaim ~25-30G before the coverage build)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: coverage-v1

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage (lcov + summary)
        working-directory: rust
        # Run instrumented tests ONCE (--no-report keeps the profraw data), then
        # emit lcov + summary from that same run. #[ignore] slow E2E auto-skip
        # (same as the PR test jobs). Write lcov to an absolute path so the
        # upload step can't miss it.
        run: |
          cargo llvm-cov --workspace --release --no-report
          cargo llvm-cov report --release --lcov --output-path "$GITHUB_WORKSPACE/lcov.info"
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report --release --summary-only >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          ls -la "$GITHUB_WORKSPACE/lcov.info"

      - name: Upload coverage artifact (lcov)
        # Report-only gate: a flaky artifact upload must NEVER red-fail coverage.
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: attune-coverage-lcov
          path: lcov.info
          retention-days: 30

  rust-test-slow-nightly:
    # R19 (2026-05-01): 慢 E2E 走 schedule 通道，每天 02:00 UTC 跑一次
    # form_factor_integration / system_wizard_full_flow_test / vault_setup_test (~6 min)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-v1-ubuntu-latest-${{ hashFiles('rust/Cargo.lock') }}
      - name: cargo test slow E2E (with --include-ignored)
        working-directory: rust
        run: cargo test --workspace --release -- --include-ignored
