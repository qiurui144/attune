name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # R19 nightly slow-test gate (02:00 UTC = 10:00 CST)
    - cron: '0 2 * * *'
  workflow_dispatch:

# 2026-06-02 GitHub Actions 默认切 Node 24 (Node 20 deprecated 2025-09).
# 提前 opt-in 验证 actions/checkout@v4 / actions/setup-node@v4 等在 Node 24 兼容.
# 此 env 仅设静态字符串 "true", 不引入 untrusted input.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  privacy-audit:
    # v1.0.6 Privacy Logic SSOT gate. Static analysis only; no untrusted
    # input is interpolated into shell commands.
    # Source: scripts/privacy-audit.sh + docs/PRIVACY.md.
    name: Privacy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run privacy-audit.sh
        run: bash scripts/privacy-audit.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Lint (non-blocking — Python prototype line, see CLAUDE.md)
        working-directory: python
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Format check (non-blocking)
        working-directory: python
        run: ruff format --check src/ tests/
        continue-on-error: true

      - name: Type check (non-blocking)
        working-directory: python
        run: mypy src/
        continue-on-error: true

      - name: Test (跳过 test_extension — Playwright e2e 需 chromium，本地手工跑)
        working-directory: python
        run: pytest tests/ -v --ignore=tests/test_extension.py

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build
        working-directory: extension
        run: npm run build
      - name: Verify build outputs (R18 #2 — dist/content/browse_capture.js 必须存在)
        working-directory: extension
        run: |
          test -f dist/content/index.js || (echo "missing dist/content/index.js"; exit 1)
          test -f dist/content/browse_capture.js || (echo "missing dist/content/browse_capture.js (G1)"; exit 1)
          test -f dist/content/indicator.css || (echo "missing dist/content/indicator.css"; exit 1)
          test -f dist/popup/index.html || (echo "missing dist/popup/index.html"; exit 1)
          test -f dist/sidepanel/index.html || (echo "missing dist/sidepanel/index.html"; exit 1)
          test -f dist/options/index.html || (echo "missing dist/options/index.html"; exit 1)
          test -f dist/background/worker.js || (echo "missing dist/background/worker.js"; exit 1)
          echo "All required dist outputs present."
      - name: Upload extension dist artifact (W4-001 — release pipeline 可下载)
        uses: actions/upload-artifact@v4
        with:
          name: attune-extension-dist
          path: extension/dist/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Rust 商用线 CI — split into PARALLEL per-crate jobs (2026-06-09).
  #
  # Previously a single `rust-test` job ran `cargo test --workspace --release`
  # on the os matrix. That one job took ~90min (ubuntu) / ~173min (windows) and
  # was KILLED by GitHub's long-job reclaim (`exit 143 "operation was canceled"`)
  # — not a test failure, a wall-clock overrun. Root cause: attune-server's
  # office/engine integration tests (office_cancel / office_concurrent /
  # office_error_contract / office_happy_path …) each boot a real attune_server
  # + load OCR/ASR engines (60s+ per test), and the full-workspace release job
  # compiled+ran every crate's tests serially.
  #
  # Fix (split, not defer — full PR coverage stays; nothing moved to nightly,
  # nothing #[ignore]d): one job per crate / test-group, all running in parallel
  # on the os matrix. Each job only compiles its crate's dep tree + runs that
  # crate's tests, so the longest single job (rust-test-server, the office hog)
  # stays well under the cancel threshold. Each job carries `timeout-minutes:`
  # so any future overrun fails FAST + CLEAR instead of a mysterious 90min cancel.
  #
  # Per-job disk/time fit (unchanged rationale): the workspace pulls wasmtime/
  # cranelift/tantivy/usearch/whisper/onnx and builds `--release` (lto=thin,
  # codegen-units=1 — slowest/largest profile). On stock runners (windows ~14G
  # free, ubuntu ~25G) the old full matrix overflowed disk. Each job keeps:
  # (1) up-front runner-disk reclaim, (2) Swatinem rust-cache (caches + PRUNES
  # target, unlike raw actions/cache on the whole dir; PER-JOB key so the
  # parallel jobs don't thrash one cache), (3) CARGO_INCREMENTAL=0 + no test/
  # release debuginfo.
  #
  # Windows stays a real (full per-crate) gate on every test job — it uniquely
  # guards .deb/.exe parity + the cross-platform .wasm "一包通吃" golden — not
  # deleted, not scoped down.
  # ───────────────────────────────────────────────────────────────────────────

  rust-test-core:
    # attune-core (the base crate: ingest / RAG / agents / vault / WASM runtime).
    # Largest test surface (~66 integration test files), all MockLlmProvider-
    # driven (no Ollama). Carries the heavy deterministic gates that are scoped
    # to attune-core, plus the build-shape guards.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-core-${{ matrix.os }}
    # Per-OS budget: the windows runner (4 vCPU, no sccache) needs ~40-50min just
    # to compile the --release dep tree per shard before tests run; ubuntu is ~2x
    # faster. 50min cancelled windows mid-compile (run 27241292586) even though
    # every test that DID run passed — so give windows 75min, keep ubuntu tight at
    # 50min so a real ubuntu hang still fails FAST + CLEAR.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 75 || 50 }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # Per-job key so the parallel jobs each own a cache slot (no thrash).
          key: core-${{ matrix.os }}-v3

      # ── Heavy deterministic gates (attune-core-scoped): ubuntu only ──
      - name: K2 Parse Golden Gate (W3 batch C, gate <95% blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: cargo test --release -p attune-core --test parse_golden_set_regression
      - name: ACP-2 Agent Quality Gate Orchestrator (manifest ratchet + #[ignore] guard, blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # Machine-checkable only-up ratchet over agent_quality_manifest.yaml +
        # #[ignore]-spike guard (per §7.2 Gate 2). spec: 2026-05-29-ai-agents-governance-orchestration.md §9
        run: cargo test --release -p attune-core --test agent_gate_orchestrator

      # ── attune-core lib + integration HALF-A: BOTH legs ──
      # attune-core has 66 integration test binaries; each statically links the
      # full release dep tree (wasmtime/tantivy/usearch/ort). On a 4-vCPU windows
      # runner, compiling all 66 alone exceeds 50min, so the integration tests
      # are split across rust-test-core (half A + lib + gates) and rust-test-core-b
      # (half B). The 3 deterministic gates (parse/agent/wasm) run as their own
      # steps above/below and are excluded from the halves.
      - name: Guard — core integration split covers every non-gate core test
        shell: bash
        working-directory: rust
        run: bash ../.github/scripts/ci-core-test-split-guard.sh
      - name: cargo test attune-core lib + integration (half A)
        working-directory: rust
        # PR-time runs lib 全 + half-A integration（#[ignore] 慢 E2E 自动跳过，走 nightly）
        run: >
          cargo test --release -p attune-core --lib
          --test asr_ingest_test
          --test change_password_test
          --test chat_reliability_golden_gate
          --test chat_reliability_integration
          --test chat_reliability_proptests
          --test chunking_quality_test
          --test concurrent_stress_test
          --test crash_recovery_test
          --test document_classifier_agent_golden_gate
          --test document_classifier_agent_integration
          --test document_classifier_agent_proptests
          --test email_accounts_test
          --test entities_test
          --test generic_plugins_test
          --test git_connector
          --test governor_integration
          --test i18n_ingest_search_test
          --test ingest_edge_resource_test
          --test ingest_email_test
          --test ingest_pipeline_test
          --test ingest_rss_test
          --test linker_entity_debug
          --test linker_golden_gate
          --test memory_consolidation_agent_golden_gate
          --test memory_consolidation_agent_integration
          --test memory_consolidation_agent_proptests
          --test memory_consolidation_integration
          --test memory_moat_integration
          --test memory_token_reduction_benchmark
          --test migration_roundtrip_test
          --test model_boundary_audit
          --test multilayer_memory_integration

      - name: WASM cross-platform golden (same .wasm on linux + windows)
        working-directory: rust
        # 跨平台分发 GA gate (spec §9):同一入库 .wasm fixture 在 ubuntu + windows
        # runner 各跑一次 golden gate,证明"一包通吃"。.wasm 已入库,无需 wasm 工具链。
        run: cargo test --release -p attune-core --test wasm_capability_gate

      # ── Build-shape guards: ubuntu only (host-OS-independent) ──
      - name: attune-core builds with wasm-runtime feature OFF (K3 极小镜像路径)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # GA checklist:--no-default-features 去 wasmtime 后 native cap 仍编译过。
        run: cargo build --release -p attune-core --no-default-features
      - name: WASM leaf build guard (attune-agent-sdk 必须可编 wasm32-wasip1)
        # leaf crate 零 native dep 守卫:任一 native-only crate(rusqlite/tokio/
        # reqwest/usearch/tantivy/hdbscan/socket2/serde_yaml/chrono)回流即编译失败,
        # 守住"确定性 agent 一包通吃所有平台"的抽取目的。仅 Linux 跑一次足够。
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: |
          rustup target add wasm32-wasip1
          cargo build -p attune-agent-sdk --target wasm32-wasip1

  rust-test-core-b:
    # Second attune-core integration shard (half B). Compiling all 66 core test
    # binaries in one job overran the 50min budget on the 4-vCPU windows runner
    # (compile-bound — it never reached running a test). Half B runs the
    # remaining ~31 integration test files; the guard (shared script) proves
    # half-A ∪ half-B ∪ gates == on-disk.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-core-b-${{ matrix.os }}
    # windows release-compile is the binding constraint (see rust-test-core).
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 75 || 50 }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: core-b-${{ matrix.os }}-v3

      - name: Guard — core integration split covers every non-gate core test
        shell: bash
        working-directory: rust
        run: bash ../.github/scripts/ci-core-test-split-guard.sh
      - name: cargo test attune-core integration (half B)
        working-directory: rust
        run: >
          cargo test --release -p attune-core
          --test ocr_image_test
          --test ocr_long_page_audit
          --test office_adversarial_test
          --test office_formats_test
          --test oom_behavior_test
          --test oss_agent_real_llm_gate
          --test oss_boundary_test
          --test pdf_e2e_search
          --test pdf_ingest_test
          --test perf_chunker_bench
          --test perf_reindex_bench
          --test pii_chat_path_redact_test
          --test plugin_protocol_e2e
          --test ppocr_icbc_smoke
          --test project_recommender_test
          --test rag_flow_audit
          --test rag_perf_audit
          --test rag_quality_benchmark
          --test rag_w2_batch1_integration
          --test rag_w3_batch_a_integration
          --test rag_w3_batch_b_integration
          --test reranker_long_doc_audit
          --test retrieval_quality_test
          --test rss_feeds_test
          --test self_evolving_skill_agent_golden_gate
          --test self_evolving_skill_agent_integration
          --test self_evolving_skill_agent_proptests
          --test session_revoke_test
          --test stress_large_scale_test
          --test webdav_remotes_test
          --test workflow_test

  # attune-server is the HOG and is sharded into FIVE parallel jobs (its 36
  # integration tests each boot a real attune_server + do an argon2 vault setup,
  # which is CPU-bound and does NOT speed up with more --test-threads, so the
  # only lever is spreading the binaries across parallel runners). 2026-06-10:
  # widened from 3 → 5 shards because group-A and office each overran the 50min
  # budget (cancelled mid-run on 27183998186 — every shard recompiles the full
  # release dep tree, then the server-boot tests are slow on ubuntu and the
  # windows runner sometimes never finished compiling):
  #   rust-test-server         — server lib + accounts + root-package integration
  #                              + non-office GROUP A (lighter route/wire tests).
  #   rust-test-server-b       — non-office GROUP B (lighter wire/logic tests).
  #   rust-test-server-c       — non-office GROUP C (heavy server-booting / vault
  #                              setup / wizard tests, pulled out of GROUP A).
  #   rust-test-server-office  — office_* shard A (5 binaries, incl. the ≈99s
  #                              office_concurrent).
  #   rust-test-server-office-b — office_* shard B (the other 5 binaries).
  # A shared guard script (ci-server-test-split-guard.sh) asserts
  # office-a ∪ office-b ∪ A ∪ B ∪ C == on-disk tests/*.rs, so a new server test
  # can't silently skip a shard.

  rust-test-server:
    # Server lib unittests + attune-accounts + the workspace-root `attune`
    # package's integration tests (server_test / classifier_test /
    # integration_test / corpus_integration_test non-#[ignore]) + non-office
    # GROUP A. GROUP B → rust-test-server-b; office_* → rust-test-server-office.
    # cargo can't exclude integration binaries, so each shard enumerates its
    # --test set explicitly; the shared guard proves the union is complete.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-server-${{ matrix.os }}
    # windows release-compile is the binding constraint: run 27241292586's
    # server-windows passed every test it reached (accounts + root all green) but
    # was still compiling group-A binaries at the 50min mark → cancel. 75min on
    # windows clears the compile; ubuntu stays tight at 50min.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 75 || 50 }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: server-${{ matrix.os }}-v3

      - name: Guard — server test split covers every server test (office+A+B+C)
        shell: bash
        working-directory: rust
        run: bash ../.github/scripts/ci-server-test-split-guard.sh

      # attune-accounts (lib) + the workspace-root `attune` package's integration
      # tests (server_test / classifier_test / integration_test +
      # corpus_integration_test's non-#[ignore] cases). Run full (no --test
      # filter) so every root/accounts test is covered. #[ignore] auto-skips.
      - name: cargo test attune-accounts + root attune integration
        working-directory: rust
        run: cargo test --release -p attune-accounts -p attune

      # attune-server lib unittests + the NON-office integration GROUP A (the
      # lighter route/wire tests). The heavy server-booting / vault-setup /
      # wizard tests live in GROUP C (rust-test-server-c); GROUP B in
      # rust-test-server-b; office_* in rust-test-server-office[-b]. The shared
      # guard above proves office-a∪office-b∪A∪B∪C == on-disk. #[ignore] 慢 E2E
      # 自动跳过(走 nightly)。
      - name: cargo test attune-server lib + non-office integration (group A)
        working-directory: rust
        run: >
          cargo test --release -p attune-server --lib
          --test ai_stack_web_search_test
          --test git_route_subprocess
          --test lock_order_abba_test
          --test marketplace_install_test
          --test ocr_profiles_routes_test
          --test privacy_endpoints_test
          --test vault_lock_endpoint_test

  rust-test-server-b:
    # Second non-office server integration shard (GROUP B — the lighter, mostly
    # pure-logic / wire tests). Split off rust-test-server so neither non-office
    # shard overruns the 50min budget (the server crate's argon2-vault-setup
    # integration tests are CPU-bound and don't speed up with more threads).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-server-b-${{ matrix.os }}
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 75 || 50 }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: server-b-${{ matrix.os }}-v3

      - name: Guard — server test split covers every server test (office+A+B+C)
        shell: bash
        working-directory: rust
        run: bash ../.github/scripts/ci-server-test-split-guard.sh

      - name: cargo test attune-server non-office integration (group B)
        working-directory: rust
        run: >
          cargo test --release -p attune-server
          --test acp4_governor_wire_test
          --test acp5_chat_flow_wire_test
          --test amd_laptop_e2e_smoke
          --test api_v1_version_test
          --test chat_cost_estimate_test
          --test eval_determinism_test
          --test eval_response_surface_test
          --test forms_routes_test
          --test index_path_test
          --test lib_runtime_test
          --test member_routes_test
          --test session_test
          --test store_queue_test

  rust-test-server-office:
    # Office/engine integration shard A: 5 office_* binaries that each boot a
    # real attune_server + vault setup (office_concurrent ≈ 99s single-threaded
    # lives here). Office split into two shards (office + office-b) because 10
    # engine-boot binaries + the full release recompile overran the 50min budget
    # on the slow ubuntu runner (cancelled mid-run on 27183998186).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-server-office-${{ matrix.os }}
    # The office tests themselves PASS fast (<3min total) once compiled; the ~16min
    # full-release dep-tree recompile per shard is the irreducible cost (NOT the
    # test count — finer office sharding does not reduce per-shard compile). windows
    # gets 75min headroom; ubuntu 50min.
    timeout-minutes: ${{ matrix.os == 'windows-latest' && 75 || 50 }}
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: server-office-${{ matrix.os }}-v3

      - name: Guard — server test split covers every server test (office+A+B+C)
