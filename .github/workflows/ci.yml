name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # R19 nightly slow-test gate (02:00 UTC = 10:00 CST)
    - cron: '0 2 * * *'
  workflow_dispatch:

# 2026-06-02 GitHub Actions 默认切 Node 24 (Node 20 deprecated 2025-09).
# 提前 opt-in 验证 actions/checkout@v4 / actions/setup-node@v4 等在 Node 24 兼容.
# 此 env 仅设静态字符串 "true", 不引入 untrusted input.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  privacy-audit:
    # v1.0.6 Privacy Logic SSOT gate. Static analysis only; no untrusted
    # input is interpolated into shell commands.
    # Source: scripts/privacy-audit.sh + docs/PRIVACY.md.
    name: Privacy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run privacy-audit.sh
        run: bash scripts/privacy-audit.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Lint (non-blocking — Python prototype line, see CLAUDE.md)
        working-directory: python
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Format check (non-blocking)
        working-directory: python
        run: ruff format --check src/ tests/
        continue-on-error: true

      - name: Type check (non-blocking)
        working-directory: python
        run: mypy src/
        continue-on-error: true

      - name: Test (跳过 test_extension — Playwright e2e 需 chromium，本地手工跑)
        working-directory: python
        run: pytest tests/ -v --ignore=tests/test_extension.py

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build
        working-directory: extension
        run: npm run build
      - name: Verify build outputs (R18 #2 — dist/content/browse_capture.js 必须存在)
        working-directory: extension
        run: |
          test -f dist/content/index.js || (echo "missing dist/content/index.js"; exit 1)
          test -f dist/content/browse_capture.js || (echo "missing dist/content/browse_capture.js (G1)"; exit 1)
          test -f dist/content/indicator.css || (echo "missing dist/content/indicator.css"; exit 1)
          test -f dist/popup/index.html || (echo "missing dist/popup/index.html"; exit 1)
          test -f dist/sidepanel/index.html || (echo "missing dist/sidepanel/index.html"; exit 1)
          test -f dist/options/index.html || (echo "missing dist/options/index.html"; exit 1)
          test -f dist/background/worker.js || (echo "missing dist/background/worker.js"; exit 1)
          echo "All required dist outputs present."
      - name: Upload extension dist artifact (W4-001 — release pipeline 可下载)
        uses: actions/upload-artifact@v4
        with:
          name: attune-extension-dist
          path: extension/dist/
          retention-days: 30

  rust-test:
    # Rust 商用线 CI — attune-core + attune-server + attune-cli workspace
    # MockLlmProvider 驱动，无 Ollama 依赖
    # R18 (2026-05-01): 跨 Linux + Windows 矩阵，CLAUDE.md P0 平台守门
    #
    # Disk/time fit (2026-06): the workspace pulls wasmtime/cranelift/tantivy/
    # usearch/whisper/onnx and builds in `--release` (lto=thin, codegen-units=1 —
    # the slowest, largest profile). On stock GH runners (windows ~14G free,
    # ubuntu ~25G) the multi-invocation release matrix overflowed disk (windows
    # ENOSPC at 2h33m). Fixes: (1) reclaim runner disk up front, (2) Swatinem
    # rust-cache (caches + PRUNES target, unlike raw actions/cache on the whole
    # dir), (3) CARGO_INCREMENTAL=0 + no test/release debuginfo to shrink target,
    # (4) scope the windows leg to a lib+fast-integration + cross-platform-wasm
    # smoke (the .deb/.exe parity it uniquely guards) — the heavy deterministic
    # gates + wasm32 leaf build run on ubuntu (the primary gate). Windows stays a
    # real (scoped) gate, not deleted.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-${{ matrix.os }}
    env:
      # Incremental compilation only bloats target/ on ephemeral CI (no reuse
      # across runs) — disable it. Strip debuginfo from test + release artifacts
      # (we don't open a debugger on CI; panics still unwind with messages).
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          # Keep the toolchain bits we need; drop the big pre-installed images.
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        # Reclaim ~15-20G: Android SDK, Chromium, and other hosted-toolcache bits
        # the rust workspace never uses. Best-effort — ignore missing paths.
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo (registry + git + target, pruned)
        # Swatinem/rust-cache caches ~/.cargo/{registry,git} + target and prunes
        # stale artifacts each run, keeping target/ from growing unbounded across
        # the release rebuilds (raw actions/cache on the whole target dir cannot
        # shrink an over-full disk).
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # Different gate scope per leg → separate cache key avoids cross-poisoning.
          key: ${{ matrix.os }}-v2

      # ── Heavy deterministic gates: ubuntu only (primary platform gate) ──
      - name: K2 Parse Golden Gate (W3 batch C, gate <95% blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: cargo test --release -p attune-core --test parse_golden_set_regression
      - name: ACP-2 Agent Quality Gate Orchestrator (manifest ratchet + #[ignore] guard, blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # Machine-checkable only-up ratchet over agent_quality_manifest.yaml +
        # #[ignore]-spike guard (per §7.2 Gate 2). A loosened threshold or an
        # #[ignore] spike fails the PR. spec: 2026-05-29-ai-agents-governance-orchestration.md §9
        run: cargo test --release -p attune-core --test agent_gate_orchestrator

      # ── Workspace lib + fast integration: BOTH legs (the P0 cross-platform gate) ──
      - name: cargo test workspace lib + fast integration
        working-directory: rust
        # R19 (2026-05-01): 慢 attune-server integration tests 加 #[ignore] 走 nightly,
        # PR-time CI 跑 lib 全 + 不带 --include-ignored 的 integration（自动跳过 #[ignore]）
        run: cargo test --workspace --release

      - name: WASM cross-platform golden (same .wasm on linux + windows)
        working-directory: rust
        # 跨平台分发 GA gate (spec §9):同一入库 .wasm fixture 在 ubuntu + windows
        # runner 各跑一次 golden gate,证明"一包通吃"。.wasm 已入库,无需 wasm 工具链。
        run: cargo test --release -p attune-core --test wasm_capability_gate

      # ── Build-shape guards: ubuntu only (host-OS-independent) ──
      - name: attune-core builds with wasm-runtime feature OFF (K3 极小镜像路径)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # GA checklist:--no-default-features 去 wasmtime 后 native cap 仍编译过。
        run: cargo build --release -p attune-core --no-default-features
      - name: WASM leaf build guard (attune-agent-sdk 必须可编 wasm32-wasip1)
        # leaf crate 零 native dep 守卫:任一 native-only crate(rusqlite/tokio/
        # reqwest/usearch/tantivy/hdbscan/socket2/serde_yaml/chrono)回流即编译失败,
        # 守住"确定性 agent 一包通吃所有平台"的抽取目的。仅 Linux 跑一次足够
        # (build-target 检查与 host OS 无关)。
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: |
          rustup target add wasm32-wasip1
          cargo build -p attune-agent-sdk --target wasm32-wasip1
      - name: cargo clippy (non-blocking)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: cargo clippy --workspace --release -- -D warnings
        continue-on-error: true

  cargo-audit:
    # Security: run cargo audit + cargo deny on every push/PR.
    # rustsec/audit-check caches advisory-db; cargo-deny checks licenses + bans.
    # No untrusted input used in run: steps.
    runs-on: ubuntu-latest
    # rustsec/audit-check@v2 posts findings as a GitHub Check Run (POST /repos/.../check-runs);
    # needs checks:write. contents:read keeps the rest of the job least-privilege.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-v1-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-audit-v1-

      - name: cargo audit (RUSTSEC vulnerability scan)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check (licenses + bans + sources)
        working-directory: rust
        run: cargo deny check

  rust-test-slow-nightly:
    # R19 (2026-05-01): 慢 E2E 走 schedule 通道，每天 02:00 UTC 跑一次
    # form_factor_integration / system_wizard_full_flow_test / vault_setup_test (~6 min)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: cargo-v1-ubuntu-latest-${{ hashFiles('rust/Cargo.lock') }}
      - name: cargo test slow E2E (with --include-ignored)
        working-directory: rust
        run: cargo test --workspace --release -- --include-ignored
