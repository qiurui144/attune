name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # R19 nightly slow-test gate (02:00 UTC = 10:00 CST)
    - cron: '0 2 * * *'
  workflow_dispatch:

# 2026-06-02 GitHub Actions 默认切 Node 24 (Node 20 deprecated 2025-09).
# 提前 opt-in 验证 actions/checkout@v4 / actions/setup-node@v4 等在 Node 24 兼容.
# 此 env 仅设静态字符串 "true", 不引入 untrusted input.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  privacy-audit:
    # v1.0.6 Privacy Logic SSOT gate. Static analysis only; no untrusted
    # input is interpolated into shell commands.
    # Source: scripts/privacy-audit.sh + docs/PRIVACY.md.
    name: Privacy Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run privacy-audit.sh
        run: bash scripts/privacy-audit.sh

  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: python
        run: pip install -e ".[dev]"

      - name: Lint (non-blocking — Python prototype line, see CLAUDE.md)
        working-directory: python
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Format check (non-blocking)
        working-directory: python
        run: ruff format --check src/ tests/
        continue-on-error: true

      - name: Type check (non-blocking)
        working-directory: python
        run: mypy src/
        continue-on-error: true

      - name: Test (跳过 test_extension — Playwright e2e 需 chromium，本地手工跑)
        working-directory: python
        run: pytest tests/ -v --ignore=tests/test_extension.py

  extension-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build
        working-directory: extension
        run: npm run build
      - name: Verify build outputs (R18 #2 — dist/content/browse_capture.js 必须存在)
        working-directory: extension
        run: |
          test -f dist/content/index.js || (echo "missing dist/content/index.js"; exit 1)
          test -f dist/content/browse_capture.js || (echo "missing dist/content/browse_capture.js (G1)"; exit 1)
          test -f dist/content/indicator.css || (echo "missing dist/content/indicator.css"; exit 1)
          test -f dist/popup/index.html || (echo "missing dist/popup/index.html"; exit 1)
          test -f dist/sidepanel/index.html || (echo "missing dist/sidepanel/index.html"; exit 1)
          test -f dist/options/index.html || (echo "missing dist/options/index.html"; exit 1)
          test -f dist/background/worker.js || (echo "missing dist/background/worker.js"; exit 1)
          echo "All required dist outputs present."
      - name: Upload extension dist artifact (W4-001 — release pipeline 可下载)
        uses: actions/upload-artifact@v4
        with:
          name: attune-extension-dist
          path: extension/dist/
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Rust 商用线 CI — split into PARALLEL per-crate jobs (2026-06-09).
  #
  # Previously a single `rust-test` job ran `cargo test --workspace --release`
  # on the os matrix. That one job took ~90min (ubuntu) / ~173min (windows) and
  # was KILLED by GitHub's long-job reclaim (`exit 143 "operation was canceled"`)
  # — not a test failure, a wall-clock overrun. Root cause: attune-server's
  # office/engine integration tests (office_cancel / office_concurrent /
  # office_error_contract / office_happy_path …) each boot a real attune_server
  # + load OCR/ASR engines (60s+ per test), and the full-workspace release job
  # compiled+ran every crate's tests serially.
  #
  # Fix (split, not defer — full PR coverage stays; nothing moved to nightly,
  # nothing #[ignore]d): one job per crate / test-group, all running in parallel
  # on the os matrix. Each job only compiles its crate's dep tree + runs that
  # crate's tests, so the longest single job (rust-test-server, the office hog)
  # stays well under the cancel threshold. Each job carries `timeout-minutes:`
  # so any future overrun fails FAST + CLEAR instead of a mysterious 90min cancel.
  #
  # Per-job disk/time fit (unchanged rationale): the workspace pulls wasmtime/
  # cranelift/tantivy/usearch/whisper/onnx and builds `--release` (lto=thin,
  # codegen-units=1 — slowest/largest profile). On stock runners (windows ~14G
  # free, ubuntu ~25G) the old full matrix overflowed disk. Each job keeps:
  # (1) up-front runner-disk reclaim, (2) Swatinem rust-cache (caches + PRUNES
  # target, unlike raw actions/cache on the whole dir; PER-JOB key so the
  # parallel jobs don't thrash one cache), (3) CARGO_INCREMENTAL=0 + no test/
  # release debuginfo.
  #
  # Windows stays a real (full per-crate) gate on every test job — it uniquely
  # guards .deb/.exe parity + the cross-platform .wasm "一包通吃" golden — not
  # deleted, not scoped down.
  # ───────────────────────────────────────────────────────────────────────────

  rust-test-core:
    # attune-core (the base crate: ingest / RAG / agents / vault / WASM runtime).
    # Largest test surface (~66 integration test files), all MockLlmProvider-
    # driven (no Ollama). Carries the heavy deterministic gates that are scoped
    # to attune-core, plus the build-shape guards.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-core-${{ matrix.os }}
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          # Per-job key so the parallel jobs each own a cache slot (no thrash).
          key: core-${{ matrix.os }}-v3

      # ── Heavy deterministic gates (attune-core-scoped): ubuntu only ──
      - name: K2 Parse Golden Gate (W3 batch C, gate <95% blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: cargo test --release -p attune-core --test parse_golden_set_regression
      - name: ACP-2 Agent Quality Gate Orchestrator (manifest ratchet + #[ignore] guard, blocks PR)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # Machine-checkable only-up ratchet over agent_quality_manifest.yaml +
        # #[ignore]-spike guard (per §7.2 Gate 2). spec: 2026-05-29-ai-agents-governance-orchestration.md §9
        run: cargo test --release -p attune-core --test agent_gate_orchestrator

      # ── attune-core lib + integration: BOTH legs ──
      - name: cargo test -p attune-core
        working-directory: rust
        # PR-time runs lib 全 + integration（#[ignore] 慢 E2E 自动跳过，走 nightly）
        run: cargo test -p attune-core --release

      - name: WASM cross-platform golden (same .wasm on linux + windows)
        working-directory: rust
        # 跨平台分发 GA gate (spec §9):同一入库 .wasm fixture 在 ubuntu + windows
        # runner 各跑一次 golden gate,证明"一包通吃"。.wasm 已入库,无需 wasm 工具链。
        run: cargo test --release -p attune-core --test wasm_capability_gate

      # ── Build-shape guards: ubuntu only (host-OS-independent) ──
      - name: attune-core builds with wasm-runtime feature OFF (K3 极小镜像路径)
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        # GA checklist:--no-default-features 去 wasmtime 后 native cap 仍编译过。
        run: cargo build --release -p attune-core --no-default-features
      - name: WASM leaf build guard (attune-agent-sdk 必须可编 wasm32-wasip1)
        # leaf crate 零 native dep 守卫:任一 native-only crate(rusqlite/tokio/
        # reqwest/usearch/tantivy/hdbscan/socket2/serde_yaml/chrono)回流即编译失败,
        # 守住"确定性 agent 一包通吃所有平台"的抽取目的。仅 Linux 跑一次足够。
        if: matrix.os == 'ubuntu-latest'
        working-directory: rust
        run: |
          rustup target add wasm32-wasip1
          cargo build -p attune-agent-sdk --target wasm32-wasip1

  # attune-server is the HOG and is sharded into TWO parallel jobs:
  #   rust-test-server        — server lib + accounts + root-package integration
  #                             + every NON-office server integration test.
  #   rust-test-server-office — the 10 office_* engine integration test binaries
  #                             (each boots a real attune_server + does vault
  #                             setup; office_concurrent alone = ~99s single-
  #                             threaded — measured locally). These dominate the
  #                             server runtime and on a 4-vCPU runner the combined
  #                             server crate overran the 50min budget.
  # A guard step asserts the office split-list exactly equals the on-disk
  # office_*.rs set, so adding a new office test can't silently skip a shard.

  rust-test-server:
    # Server lib + accounts + workspace-root package + all NON-office server
    # integration tests. `attune` = the workspace-root package; its tests/
    # (server_test / classifier_test / corpus_integration_test / integration_test)
    # boot AppState across core+server, so they ride the server leg.
    # cargo can't exclude integration binaries, so the NON-office tests are
    # enumerated explicitly via --test below, and office runs in the sibling
    # rust-test-server-office job. Coverage of the old `--workspace` run is
    # preserved (office in the sibling job; the guard there proves no office
    # binary is dropped).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-server-${{ matrix.os }}
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: server-${{ matrix.os }}-v3

      - name: Guard — non-office split-list covers every NON-office server test
        # Fails loudly if a new (non-office) tests/*.rs appears that isn't in the
        # --test list below, so a new server integration test can't silently skip
        # CI. (office_* files are intentionally excluded — they run in the
        # rust-test-server-office shard.)
        shell: bash
        working-directory: rust
        run: |
          listed="acp4_governor_wire_test acp5_chat_flow_wire_test ai_stack_web_search_test amd_laptop_e2e_smoke api_v1_version_test chat_cost_estimate_test eval_determinism_test eval_response_surface_test form_factor_integration forms_routes_test git_route_subprocess index_path_test lib_runtime_test lock_order_abba_test marketplace_install_test member_routes_test ocr_profiles_routes_test privacy_endpoints_test projects_routes_test session_test settings_lock_test store_queue_test system_wizard_full_flow_test vault_lock_endpoint_test vault_recovery_test vault_setup_test"
          listed_sorted=$(echo $listed | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')
          actual=$(ls crates/attune-server/tests/*.rs | xargs -n1 basename | sed 's/\.rs$//' | grep -v '^office_' | sort | tr '\n' ' ' | sed 's/ $//')
          if [ "$listed_sorted" != "$actual" ]; then
            echo "::error::non-office server test split-list drifted."
            echo "listed : $listed_sorted"
            echo "on-disk: $actual"
            echo "Update rust-test-server's --test list to match (or move new office_* to the office shard)."
            exit 1
          fi
          echo "non-office split-list OK ($(echo $actual | wc -w) binaries)."

      # attune-accounts (lib) + the workspace-root `attune` package's integration
      # tests (server_test / classifier_test / integration_test +
      # corpus_integration_test's non-#[ignore] cases). Run full (no --test
      # filter) so every root/accounts test is covered. #[ignore] auto-skips.
      - name: cargo test attune-accounts + root attune integration
        working-directory: rust
        run: cargo test --release -p attune-accounts -p attune

      # attune-server lib unittests + every NON-office integration test, listed
      # explicitly via --test so this job never touches the office engine
      # binaries (those run in rust-test-server-office). The guard in the office
      # job fails loudly if a NEW office_*.rs appears unassigned. #[ignore]
      # 慢 E2E 自动跳过(走 nightly)。
      - name: cargo test attune-server lib + non-office integration
        working-directory: rust
        run: >
          cargo test --release -p attune-server --lib
          --test acp4_governor_wire_test
          --test acp5_chat_flow_wire_test
          --test ai_stack_web_search_test
          --test amd_laptop_e2e_smoke
          --test api_v1_version_test
          --test chat_cost_estimate_test
          --test eval_determinism_test
          --test eval_response_surface_test
          --test form_factor_integration
          --test forms_routes_test
          --test git_route_subprocess
          --test index_path_test
          --test lib_runtime_test
          --test lock_order_abba_test
          --test marketplace_install_test
          --test member_routes_test
          --test ocr_profiles_routes_test
          --test privacy_endpoints_test
          --test projects_routes_test
          --test session_test
          --test settings_lock_test
          --test store_queue_test
          --test system_wizard_full_flow_test
          --test vault_lock_endpoint_test
          --test vault_recovery_test
          --test vault_setup_test

  rust-test-server-office:
    # The office/engine integration shard: 10 office_* binaries that each boot a
    # real attune_server + vault setup (office_concurrent ≈ 99s single-threaded).
    # Split off rust-test-server so neither shard overruns the 50min budget.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-server-office-${{ matrix.os }}
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: server-office-${{ matrix.os }}-v3

      - name: Guard — office split-list matches on-disk office_*.rs (no silent gap)
        # Fails loudly if someone adds/removes an office_* test file without
        # updating this shard, so coverage can't silently drift.
        shell: bash
        working-directory: rust
        run: |
          expected="office_asr_golden_gate office_cancel_test office_concurrent_test office_error_contract office_failure_recovery_test office_happy_path office_ocr_golden_gate office_prop_tests office_schema_compat office_six_category_floor"
          actual=$(ls crates/attune-server/tests/office_*.rs | xargs -n1 basename | sed 's/\.rs$//' | sort | tr '\n' ' ' | sed 's/ $//')
          exp_sorted=$(echo $expected | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')
          if [ "$actual" != "$exp_sorted" ]; then
            echo "::error::office test split-list drifted."
            echo "expected: $exp_sorted"
            echo "on-disk : $actual"
            echo "Update rust-test-server-office's --test list to match."
            exit 1
          fi
          echo "office split-list OK ($(echo $actual | wc -w) binaries)."

      - name: cargo test attune-server office/engine integration shard
        working-directory: rust
        run: >
          cargo test --release -p attune-server
          --test office_asr_golden_gate
          --test office_cancel_test
          --test office_concurrent_test
          --test office_error_contract
          --test office_failure_recovery_test
          --test office_happy_path
          --test office_ocr_golden_gate
          --test office_prop_tests
          --test office_schema_compat
          --test office_six_category_floor

  rust-test-cli:
    # attune-cli (light: 4 smoke tests). Folds the attune-agent-sdk leaf-crate
    # lib tests too (tiny) so every workspace member's tests run somewhere.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: rust-test-cli-${{ matrix.os }}
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_TEST_DEBUG: "false"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
      RUST_BACKTRACE: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Free disk space (windows — drop large pre-installed SDKs)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $paths = @(
            "$env:ANDROID_HOME",
            "$env:CHROMEWEBDRIVER",
            "C:\Android",
            "C:\Program Files (x86)\Android",
            "$env:AGENT_TOOLSDIRECTORY\CodeQL"
          )
          foreach ($p in $paths) {
            if ($p -and (Test-Path $p)) {
              Write-Host "Removing $p"
              Remove-Item -Recurse -Force $p -ErrorAction SilentlyContinue
            }
          }
          Get-PSDrive C | Select-Object Used,Free

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: cli-${{ matrix.os }}-v3

      - name: cargo test -p attune-cli -p attune-agent-sdk
        working-directory: rust
        run: cargo test -p attune-cli -p attune-agent-sdk --release

  rust-clippy:
    # Lint as its own parallel job (was an inline non-blocking step). Stays
    # non-blocking (continue-on-error) to preserve prior behavior — the Python
    # prototype line + Rust workspace lint is advisory, not a PR hard-gate here.
    runs-on: ubuntu-latest
    name: rust-clippy
    timeout-minutes: 50
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "false"
      CARGO_NET_RETRY: "10"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (ubuntu — reclaim ~25-30G before the release build)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo (registry + git + target, pruned)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: clippy-ubuntu-latest-v3

      - name: cargo clippy (non-blocking)
        working-directory: rust
        run: cargo clippy --workspace --release -- -D warnings
        continue-on-error: true

  cargo-audit:
    # Security: run cargo audit + cargo deny on every push/PR.
    # rustsec/audit-check caches advisory-db; cargo-deny checks licenses + bans.
    # No untrusted input used in run: steps.
    runs-on: ubuntu-latest
    # rustsec/audit-check@v2 posts findings as a GitHub Check Run (POST /repos/.../check-runs);
    # needs checks:write. contents:read keeps the rest of the job least-privilege.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-v1-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: cargo-audit-v1-

      - name: cargo audit (RUSTSEC vulnerability scan)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          working-directory: rust

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check (licenses + bans + sources)
        working-directory: rust
        run: cargo deny check

  rust-test-slow-nightly:
    # R19 (2026-05-01): 慢 E2E 走 schedule 通道，每天 02:00 UTC 跑一次
    # form_factor_integration / system_wizard_full_flow_test / vault_setup_test (~6 min)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
