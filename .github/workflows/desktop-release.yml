name: desktop-release

on:
  push:
    tags: ['desktop-v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'rust/crates/attune-server/ui/package-lock.json'

      - name: Build frontend
        run: cd rust/crates/attune-server/ui && npm ci && npm run build

      - name: Install tauri-cli
        run: cargo install --locked tauri-cli --version "^2.0"

      - name: Build Tauri bundles
        working-directory: apps/attune-desktop
        run: cargo tauri build --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: attune-desktop-${{ matrix.target }}
          path: apps/attune-desktop/target/release/bundle/**/*
          retention-days: 30

      # 自动创建/更新 GitHub Release 并上传 installer 二进制. 不再依赖手工
      # gh release create (历史 desktop-v0.6.0 / desktop-v0.6.1 都是手工补的).
      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          name: Attune Desktop ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            apps/attune-desktop/target/release/bundle/nsis/*.exe
            apps/attune-desktop/target/release/bundle/msi/*.msi
            apps/attune-desktop/target/release/bundle/deb/*.deb
            apps/attune-desktop/target/release/bundle/appimage/*.AppImage
            apps/attune-desktop/target/release/bundle/rpm/*.rpm
