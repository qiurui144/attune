name: Docker Publish

# Publish attune-cli + attune-server container images to ghcr.io
# Triggered by GA version tags (e.g. v1.0.0)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: attune-cli
            dockerfile: Dockerfile.cli
            description: "Attune CLI — lightweight headless knowledge tool"
          - name: attune-server
            dockerfile: Dockerfile.server
            description: "Attune headless server with embedded Web UI (port 18900)"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        env:
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "value=$DISPATCH_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=${{ matrix.description }}
            org.opencontainers.image.url=https://github.com/qiurui144/attune
            org.opencontainers.image.source=https://github.com/qiurui144/attune
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: true
          sbom: true

      - name: Image digest
        env:
          IMAGE_NAME: ${{ matrix.name }}
          DIGEST: ${{ steps.meta.outputs.digest }}
        run: echo "Pushed ${REGISTRY}/${IMAGE_OWNER}/${IMAGE_NAME} digest ${DIGEST}"
