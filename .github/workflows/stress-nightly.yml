name: Stress & Crash Recovery (Nightly)

# 每天 UTC 02:00 自动跑，或手动触发
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  stress:
    name: attune-core stress tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-stress-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-stress-

      - name: Run crash recovery tests
        working-directory: rust
        run: |
          cargo test -p attune-core --release \
            --test crash_recovery_test \
            -- --nocapture --ignored

      - name: Run concurrent stress tests
        working-directory: rust
        run: |
          cargo test -p attune-core --release \
            --test concurrent_stress_test \
            -- --nocapture --ignored

      - name: Run OOM behavior tests
        working-directory: rust
        run: |
          cargo test -p attune-core --release \
            --test oom_behavior_test \
            -- --nocapture --ignored

      - name: Run large scale stress tests
        working-directory: rust
        # 大规模测试内存/时间消耗高，单独步骤便于超时定位
        timeout-minutes: 40
        run: |
          cargo test -p attune-core --release \
            --test stress_large_scale_test \
            -- --nocapture --ignored
