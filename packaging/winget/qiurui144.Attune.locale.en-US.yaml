Description: |
  Attune is a private AI knowledge companion that captures, indexes, and retrieves
  your knowledge across documents, conversations, and web browsing. Hybrid local +
  cloud intelligence: local Embedding/Rerank/ASR/OCR on your hardware, optional
  cloud LLMs (BYOK or Pro membership gateway). End-to-end encrypted vault with
  Argon2id + AES-256-GCM. Zero data ever leaves your device without explicit action.
